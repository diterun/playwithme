<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a2438" />
  <title>iso colony</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="res-chips"></div>
    <div class="sep"></div>
    <div class="stat" id="era">🪨 석기</div>
    <div class="stat" id="clock">06:00</div>
  </div>

  <canvas id="game"></canvas>

  <!-- 탭 오버레이 패널 (맵 위로 올라옴) -->
  <div id="panel" class="hidden">
    <div id="panel-head"><span id="panel-title"></span><button id="panel-close">✕</button></div>
    <div id="panel-body"></div>
  </div>

  <!-- 하단 탭바 -->
  <nav id="tabbar">
    <button class="tab active" data-tab="village"><span>🏠</span>마을</button>
    <button class="tab" data-tab="res"><span>📦</span>자원</button>
    <button class="tab" data-tab="build"><span>🏗️</span>건설</button>
    <button class="tab" data-tab="expedition"><span>⚔️</span>원정</button>
  </nav>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
