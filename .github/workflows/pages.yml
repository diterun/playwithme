name: Deploy to GitHub Pages

# main 에 push 될 때마다 배포. 수동 실행(workflow_dispatch)도 열어둔다.
on:
  push:
    branches: [main]
  workflow_dispatch:

# 동시에 여러 push 가 들어와도 배포는 하나씩 처리한다(동시 배포 충돌 = "Deployment failed" 주원인 차단).
# cancel-in-progress: false → 진행 중인 배포를 죽이지 않고 큐에 세운다(중간 배포 유실 방지).
concurrency:
  group: pages
  cancel-in-progress: false

# GitHub Pages(Actions 소스) 배포에 필요한 최소 권한.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.final.outputs.page_url || steps.try2.outputs.page_url || steps.try1.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 정적 사이트라 빌드가 없다 — 리포 루트를 그대로 아티팩트로 올린다
      # (diterun.github.io/playwithme/estate_tycoon/ 구조 유지). Jekyll 처리는 하지 않는다.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # ── 배포: GitHub 쪽 일시 장애("Deployment failed, try again later")에 대비해 최대 3회 자동 재시도 ──
      - name: Deploy (attempt 1)
        id: try1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.try1.outcome == 'failure'
        run: sleep 45

      - name: Deploy (attempt 2)
        id: try2
        if: steps.try1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        run: sleep 90

      # 마지막 시도는 continue-on-error 없이 — 여기서도 실패하면 워크플로를 실패로 표시한다.
      - name: Deploy (final attempt)
        id: final
        if: steps.try1.outcome == 'failure' && steps.try2.outcome == 'failure'
        uses: actions/deploy-pages@v4
